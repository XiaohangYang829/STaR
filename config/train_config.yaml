work_dir: ./work_dir/train_new/
mesh_path: ./datasets/mixamo/shape/
texture_path: ./datasets/mixamo/texture_datapath/

model_save_name: star
device: [0]
seed: 42
description: This is the training process of STaR.
wandb_tags: ['STaR']
use_source_mesh: true

alpha: 100
euler_order: yzx
max_length: 60
num_joints: 22
margin: 0.3

train_set: datasets.train_set.Feeder
train_set_args:
  source_path: ./datasets/mixamo/train/train_source/
  train_data_path: ./datasets/mixamo/train/train_data.npy  # simple version
  q_path: ./datasets/mixamo/train/train_q/
  stats_path: ./datasets/mixamo/stats/  # will calculate the stats, which will be used for test / inference
  shape_path: ./datasets/mixamo/shape/
  max_length: 60
  use_rot6d: &use_rot6d false  # change here only — test_set_args will follow automatically

test_set: datasets.test_set.Feeder
test_set_args:
  test_pairs: ./datasets/mixamo/test/test.json
  test_data_path: ./datasets/mixamo/test/test_data.npy
  stats_path: ./datasets/mixamo/stats/
  shape_path: ./datasets/mixamo/test_shape/
  min_steps: 120
  max_steps: 120
  use_rot6d: *use_rot6d

model_path: method.network
model_name: Retarget_Model
optimize_param:
  - delta_shape_dec

model_args:
  num_joint: 22
  num_frame: 60
  token_channels: 64
  hidden_channels: 64
  embed_channels: 32
  use_rot6d: *use_rot6d  # follows train_set_args.use_rot6d

loss_function: Loss
loss_args:
  joint_vector_loss: 1.0
  temporal_loss: 1.0
  constrain_loss: 0.01
  twist_constrain_loss: 10.0
  new_geometric_loss:
    - 10.0
    - 0.0

scale_info_path: ./datasets/mixamo/scale_info/
hand_vert_num: 200
limb_vert_num: 300
wo_limb_vert_num: 4000

test_weights:
test_ignore_weights: []

encoding_model: Pct
encoding_model_args:
  dropout: 0.5
  output_channels: 40
encoding_model_weights: datasets/mixamo/encoding_model_weights/model.t7

epoch: 50
global_epoch: 50
save_epoch: 5
balance_alpha: 0.02  # score = pen_rate + alpha * curv_diff; pen_rate~0.01-0.10, curv_diff~0.5-5.0 m/s^2
                     # calibrate alpha from first valid-2.txt: alpha = pen_rate / curv_diff
patience: 0          # early stopping: # val checks with no improvement (val runs every 2 epochs, 0=disabled)
step: [30]
global_step: [30]
base_lr: 0.001
stage2_lr_scale: 0.5
global_lr: 0.001
batch_size: 16
test_k: 0.8
test_batch_size: 64
weight_decay: 0.0
