work_dir: ./work_dir/paper_version/
mesh_path: ./datasets/mixamo/shape/
texture_path: ./datasets/mixamo/texture_datapath/
model_save_name: retarget_model
device: [0]
seed: 42
description: This is the testing process of STaR.
wandb_tags: ['STaR']
use_source_mesh: true

max_length: 60
num_joints: 22
kp: 0.8
margin: 0.3

test_set: datasets.test_set.Feeder
test_set_args:
  test_pairs: ./datasets/mixamo/test/test.json
  test_data_path: ./datasets/mixamo/test/test_data.npy  # simple version
  stats_path: ./datasets/mixamo/stats/
  shape_path: ./datasets/mixamo/test_shape/  # test shapes are more than train shapes, for unseen characters
  min_steps: 120
  max_steps: 120
  use_rot6d: false  # use 6D rotation repr (rot6d) instead of quaternions; set true when model also uses rot6d

model_path: method.network
model_name: Retarget_Model
optimize_param:
  - delta_shape_dec

model_args:
  num_joint: 22
  num_frame: 60
  token_channels: 64
  hidden_channels: 64
  embed_channels: 32
  use_rot6d: false  # set true when model was trained with rot6d

loss_function: Loss
loss_args:
  joint_vector_loss: 1.0
  temporal_loss: 1.0
  constrain_loss: 0.01
  twist_constrain_loss: 10.0
  new_geometric_loss:
    - 10.0
    - 0.0
alpha: 100
euler_order: yzx

scale_info_path: ./datasets/mixamo/scale_info/
hand_vert_num: 200
limb_vert_num: 300
wo_limb_vert_num: 4000

test_weights: retarget_model.pt
test_ignore_weights: []

encoding_model: Pct
encoding_model_args:
  dropout: 0.5
  output_channels: 40
encoding_model_weights: datasets/mixamo/encoding_model_weights/model.t7

epoch: 50
global_epoch: 50
step: [30]
global_step: [30]
batch_size: 16
test_k: 0.8
test_batch_size: 64
weight_decay: 0.0
